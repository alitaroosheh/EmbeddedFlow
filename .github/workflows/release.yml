# Publish EmbeddedFlow to the VS Code Marketplace.
#
# Triggers
#   • Tag push v<semver>  (e.g. v1.0.0, v1.2.0-beta.1) — Marketplace publish
#   • Push to branch `release` — CI only (compile, test, package VSIX artifact)
#
# Create a release (typical flow):
#   git checkout release
#   git merge main
#   git tag v1.2.0-beta.1
#   git push origin release
#   git push origin v1.2.0-beta.1
#
# Repository secret (required for publish job):
#   VSCE_PAT — Personal Access Token with Marketplace "Manage" scope
#   https://code.visualstudio.com/api/working-with-extensions/publishing-extension#create-a-publisher

name: Release

on:
  push:
    branches:
      - release
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Release branch: validate without publishing ─────────────────────────────
  validate:
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Package VSIX
        run: npx --yes @vscode/vsce@latest package

      - uses: actions/upload-artifact@v4
        with:
          name: embeddedflow-vsix-validate
          path: "*.vsix"
          if-no-files-found: error

  # ── Version tag: publish to Marketplace ─────────────────────────────────────
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Check VSCE_PAT secret
        run: |
          if [ -z "${{ secrets.VSCE_PAT }}" ]; then
            echo "::error::Secret VSCE_PAT is not set."
            echo "Add a Marketplace PAT (Manage scope) as repository secret VSCE_PAT."
            echo "See docs/MARKETPLACE_RELEASE.md"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require tag on release branch
        run: |
          git fetch --no-tags origin "refs/heads/release:refs/remotes/origin/release"
          git rev-parse --verify refs/remotes/origin/release >/dev/null
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "refs/remotes/origin/release"; then
            echo "::error::Tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) must point to a commit on branch 'release' (tip: $(git rev-parse refs/remotes/origin/release))."
            exit 1
          fi
          echo "Tag is on release branch."

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Sync package.json version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Invalid tag format: $TAG (expected vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease)"
            exit 1
          fi
          # Marketplace accepts only x.y.z (no -beta suffix in package.json version).
          MARKET_VERSION=$(echo "$VERSION" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          npm version "$MARKET_VERSION" --no-git-tag-version --allow-same-version
          if [ "$VERSION" != "$MARKET_VERSION" ]; then
            echo "PRE_RELEASE=true" >> "$GITHUB_ENV"
            echo "Packaging version $MARKET_VERSION (tag $TAG, pre-release=true)"
          else
            echo "PRE_RELEASE=false" >> "$GITHUB_ENV"
            echo "Packaging version $MARKET_VERSION (pre-release=false)"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ "$PRE_RELEASE" = "true" ]; then
            npx --yes @vscode/vsce@latest publish --pre-release -p "$VSCE_PAT"
          else
            npx --yes @vscode/vsce@latest publish -p "$VSCE_PAT"
          fi

      - name: Package VSIX for GitHub Release
        run: npx --yes @vscode/vsce@latest package

      - uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ env.PRE_RELEASE == 'true' }}
